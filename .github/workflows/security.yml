name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install pip-audit bandit

      # Dependency CVE scan against the pinned requirements.
      - name: pip-audit (dependency CVEs)
        working-directory: backend
        run: pip-audit -r requirements.txt

      # Static analysis of application code. -ll = medium+ severity,
      # -ii = medium+ confidence (cuts false positives).
      - name: bandit (SAST)
        working-directory: backend
        run: bandit -r app/ -ll -ii
