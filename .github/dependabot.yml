version: 2
updates:
  # Python dependencies (backend/requirements*.txt)
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      # Batch routine updates into one PR to cut review noise; security
      # updates still come through promptly.
      python-dependencies:
        patterns: ["*"]

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
