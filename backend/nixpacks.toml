[phases.setup]
aptPkgs = [
  "ffmpeg",
  "pulseaudio",
  "pulseaudio-utils",
  "xvfb",
  "x11-utils",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libdbus-1-3",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libasound2",
  "libpango-1.0-0",
  "libcairo2",
  "libglib2.0-0",
  "libx11-6",
  "libx11-xcb1",
  "libxcb1",
  "libxext6",
  "fonts-liberation",
  "fonts-unifont",
  "ca-certificates",
  "curl",
  "wget"
]

[phases.build]
cmds = ["playwright install chromium"]

[start]
cmd = "bash start.sh"
