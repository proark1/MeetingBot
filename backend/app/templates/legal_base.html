<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}JustHereToListen.io{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect rx='20' width='100' height='100' fill='%231B2033'/><text x='50' y='68' text-anchor='middle' font-size='48' font-family='system-ui' fill='white'>🎙</text></svg>">
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='dark')document.documentElement.setAttribute('data-theme','dark');else if(!t&&window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark');})();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#F3EAE2; --surface:#ffffff; --ink:#16182B; --muted:#6B6F7E;
      --border:#E7DCD2; --primary:#FF5436; --accent:#FF5436;
    }
    [data-theme="dark"]{
      --bg:#0E0F1A; --surface:#181A2B; --ink:#ECEAF2; --muted:#9AA0B4;
      --border:#2A2E44; --primary:#FF6A4D; --accent:#FF6A4D; color-scheme:dark;
    }
    *{box-sizing:border-box;}
    body{
      margin:0; background:var(--bg); color:var(--ink);
      font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
      font-size:15px; line-height:1.7;
    }
    .legal-nav{
      display:flex; align-items:center; justify-content:space-between;
      padding:0.85rem 1.5rem; border-bottom:1px solid var(--border);
      background:var(--surface); position:sticky; top:0; z-index:10;
    }
    .legal-brand{ display:flex; align-items:center; gap:0.5rem; font-weight:700;
      color:var(--ink); text-decoration:none; letter-spacing:-0.3px; }
    .legal-brand .ic{ width:28px; height:28px; background:var(--primary);
      border-radius:7px; display:inline-flex; align-items:center; justify-content:center; font-size:14px; }
    .legal-nav a.back{ color:var(--muted); text-decoration:none; font-size:13.5px; font-weight:500; }
    .legal-nav a.back:hover{ color:var(--ink); }
    .legal-wrap{ max-width:820px; margin:0 auto; padding:2.5rem 1.5rem 4rem; }
    .legal-wrap h1{ font-size:2rem; letter-spacing:-0.5px; margin:0 0 0.35rem; }
    .legal-meta{ color:var(--muted); font-size:13.5px; margin:0 0 2rem; }
    .legal-wrap h2{ font-size:1.2rem; margin:2rem 0 0.6rem; letter-spacing:-0.2px; }
    .legal-wrap h3{ font-size:1rem; margin:1.4rem 0 0.4rem; }
    .legal-wrap p, .legal-wrap li{ color:var(--ink); }
    .legal-wrap a{ color:var(--accent); }
    [data-theme="dark"] .legal-wrap a{ color:#93c5fd; }
    .legal-wrap ul{ padding-left:1.25rem; }
    .legal-wrap code{ background:var(--surface); border:1px solid var(--border);
      padding:1px 5px; border-radius:4px; font-size:0.86em; }
    .legal-callout{ background:var(--surface); border:1px solid var(--border);
      border-radius:12px; padding:1rem 1.2rem; margin:1.5rem 0; font-size:14px; }
    .legal-footer{ border-top:1px solid var(--border); margin-top:2.5rem; padding-top:1.5rem;
      color:var(--muted); font-size:13px; display:flex; gap:1.25rem; flex-wrap:wrap; }
    .legal-footer a{ color:var(--muted); text-decoration:none; }
    .legal-footer a:hover{ color:var(--ink); }
  
    /* JHTL v2 legal layer */
    .legal-brand, .legal-wrap h1, .legal-wrap h2, .legal-wrap h3 { font-family:'Space Grotesk','Inter',system-ui,sans-serif; letter-spacing:-0.02em; }
    .legal-brand .ic{ box-shadow:0 2px 8px rgba(255,84,54,.30); }
    [data-theme="dark"] .legal-wrap a{ color:var(--accent); }
</style>
</head>
<body>
  <nav class="legal-nav">
    <a class="legal-brand" href="/"><span class="ic" aria-hidden="true"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-3px"><path d="M4 14v-2a8 8 0 0 1 16 0v2"/><path d="M20 16a2 2 0 0 1-2 2h-1v-6h1a2 2 0 0 1 2 2zM4 16a2 2 0 0 0 2 2h1v-6H6a2 2 0 0 0-2 2z"/></svg></span><span>JustHereToListen.io</span></a>
    <a class="back" href="/">← Back to home</a>
  </nav>
  <main class="legal-wrap">
    {% block legal_body %}{% endblock %}
    <div class="legal-footer">
      <a href="/">Home</a>
      <a href="/trust">Trust & Security</a>
      <a href="/privacy">Privacy Policy</a>
      <a href="/terms">Terms of Service</a>
      <span>© 2026 JustHereToListen.io</span>
    </div>
  </main>
</body>
</html>
