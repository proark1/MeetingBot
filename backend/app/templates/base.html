<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}MeetingBot{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .balance-badge { font-size: 1rem; }
    .card { border: none; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    .tx-credit { color: #198754; }
    .tx-debit  { color: #dc3545; }
    code { background: #e9ecef; padding: 2px 6px; border-radius: 4px; font-size: .85em; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/dashboard">&#127881; MeetingBot</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav ms-auto">
        {% if account %}
        <li class="nav-item">
          <a class="nav-link" href="/dashboard">Dashboard</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/topup">Top Up</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="/api/docs" target="_blank">API Docs</a>
        </li>
        {% if is_admin %}
        <li class="nav-item">
          <a class="nav-link text-warning" href="/admin">Admin</a>
        </li>
        {% endif %}
        <li class="nav-item">
          <a class="nav-link" href="/logout">Logout</a>
        </li>
        {% else %}
        <li class="nav-item"><a class="nav-link" href="/login">Login</a></li>
        <li class="nav-item"><a class="nav-link" href="/register">Register</a></li>
        {% endif %}
      </ul>
    </div>
  </div>
</nav>
<div class="container">
  {% if flash %}
  <div class="alert alert-{{ flash.type }} alert-dismissible fade show" role="alert">
    {{ flash.message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
