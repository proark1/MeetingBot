{% extends "base.html" %}
{% block title %}Register — MeetingBot{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="mb-4">Create an account</h4>
      <form method="post" action="/register">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password <small class="text-muted">(min 8 characters)</small></label>
          <input type="password" name="password" class="form-control" minlength="8" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create account</button>
      </form>
      <hr>
      <p class="text-center mb-0">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
