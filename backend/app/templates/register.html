{% extends "base.html" %}
{% block title %}Register — MeetingBot{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4">
      <h4 class="mb-4">Create an account</h4>
      <form method="post" action="/register">
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label">Password <small class="text-muted">(min 8 characters)</small></label>
          <input type="password" name="password" class="form-control" minlength="8" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Account type</label>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="account_type" id="type-personal" value="personal" checked>
            <label class="form-check-label" for="type-personal">
              <strong>Personal</strong> — for individual use
            </label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="radio" name="account_type" id="type-business" value="business">
            <label class="form-check-label" for="type-business">
              <strong>Business</strong> — for platforms integrating MeetingBot for multiple end-users
            </label>
          </div>
          <small class="text-muted mt-1 d-block">
            Business accounts use a single API key but can isolate data per end-user via the <code>X-Sub-User</code> header.
          </small>
        </div>
        <button type="submit" class="btn btn-primary w-100">Create account</button>
      </form>
      <hr>
      <p class="text-center mb-0">Already have an account? <a href="/login">Login</a></p>
    </div>
  </div>
</div>
{% endblock %}
