version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./frontend:/frontend
      - meetingbot_db:/app/data
    environment:
      # AI providers — set either (or both); Anthropic takes precedence when both are set
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      # Database — defaults to local SQLite for dev.
      # In production (Railway/Supabase) set DATABASE_URL or SUPABASE_* in your environment;
      # the variable below falls back to SQLite only when DATABASE_URL is not set.
      - DATABASE_URL=${DATABASE_URL:-sqlite+aiosqlite:////app/data/meetingbot.db}
      # Supabase alternative — set these instead of DATABASE_URL when using Supabase
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_DB_PASSWORD=${SUPABASE_DB_PASSWORD:-}
      # Bot behaviour
      - BOT_SIMULATION_DURATION=${BOT_SIMULATION_DURATION:-60}
      - BOT_ADMISSION_TIMEOUT=${BOT_ADMISSION_TIMEOUT:-300}
      - BOT_MAX_DURATION=${BOT_MAX_DURATION:-7200}
      - PULSE_RUNTIME_PATH=/tmp/pulse
    # Chromium requires extra shared memory
    shm_size: "2gb"
    command: /app/start.sh uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    restart: unless-stopped

volumes:
  meetingbot_db:
